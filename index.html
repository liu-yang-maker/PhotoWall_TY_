<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Love Journey</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="readme_img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="readme_img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="readme_img/favicon/favicon-16x16.png">
    <link rel="manifest" href="readme_img/favicon/site.webmanifest">
</head>
<body>
    <!-- 背景特效画布 -->
    <canvas id="heartCanvas" aria-hidden="true"></canvas>

    <!-- 背景切换按钮：在三种效果之间循环切换 -->
    <div id="themeToggle" class="theme-toggle" aria-label="切换背景效果">
        <button id="themeBtn" title="切换背景效果（爱心雨 / 星空 / 流星）">
            <span id="themeIcon">💝</span>
        </button>
    </div>

    <nav>
        <div class="container">
            <h1>Our Love Journey</h1>
        </div>
    </nav>

    <main>
        <section id="name">
            <h2>Xiaotong 晓彤 & Yang 洋</h2>
        </section>

        <section id="timer">
            <audio id="bgm" src="music/music1.mp3" controls></audio>
            <p>We have been in love for</p>
            <h2><span id="loveDays">0</span> Days</h2>
        </section>

        <!-- 每日情话生成器 -->
        <section id="loveQuote">
            <div class="quote-container">
                <div class="quote-icon">💕</div>
                <p id="quoteText">Loading...</p>
                <button id="newQuoteBtn" class="quote-btn">换一句情话</button>
            </div>
        </section>

        <section id="dates">
            <div class="date-item">
                <p>1998.10.24</p>
                <span>Her Birthday</span>
            </div>
            <div class="date-item">
                <p>1997.11.22</p>
                <span>His Birthday</span>
            </div>
            <div class="date-item">
                <p>2025.11.22</p>
                <span>Anniversary</span>
            </div>
        </section>

        <!-- 恋爱时间轴 -->
        <section id="timeline">
            <h2 class="section-title">Our Love Story Timeline</h2>
            <div class="timeline-container" id="timelineContainer">
                <!-- 时间轴内容将通过JavaScript动态生成 -->
            </div>
        </section>

        <!-- 互动小票（Three.js + Verlet 纸张模拟） -->
        <section id="receiptStage" aria-label="Interactive receipt">
            <div class="receipt-shell">
                <div class="receipt-hint">按住小票任意位置拖拽，可弯曲、折叠并自然回弹</div>
                <div id="receiptMount" class="receipt-mount"></div>
            </div>
        </section>

        <section id="gallery">
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; Written by <a href="https://github.com/liu-yang-maker" target="_blank">liu-yang-maker</a>. Enhanced with ❤️ between Tong and Yang</p>
        </div>
    </footer>

    <div id="popup">
        <span id="closeBtn">&times;</span>
        <p id="imgDate"></p>
        <img id="popupImg" src="" alt="Large Image">
        <video id="popupVideo" controls playsinline style="display:none;"></video>
    </div>

    <div id="leftArrow" class="arrow">◄</div>
    <div id="rightArrow" class="arrow">►</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
    <script src="script.js"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="receipt.js"></script>
    <script src="hearts.js"></script>
    <script src="stars.js"></script>
    <script src="meteors.js"></script>
    <script src="starry.js"></script>
</body>
</html>
